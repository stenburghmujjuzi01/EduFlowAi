<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduFlow Ai — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1a2436;
    --border: #2c3a52;
    --text: #eef2f7;
    --muted: #93a2b8;
    --gold: #d8ad4c;
    --gold-dim: #7a622c;
    --green: #55c98a;
    --red: #e5707a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  h1, h2, .brand {
    font-family: 'Space Grotesk', system-ui, sans-serif;
  }

  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #gate .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  #gate .brand span { color: var(--gold); }
  #gate input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    width: 260px;
  }
  #gate input:focus { outline: 2px solid var(--gold-dim); }
  #gate button {
    background: var(--gold);
    color: #1a1404;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  #gate button:hover { filter: brightness(1.08); }
  #gate-error { color: var(--red); font-size: 13px; min-height: 18px; }

  #dashboard { display: none; max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  header.top .brand { font-size: 20px; font-weight: 700; }
  header.top .brand span { color: var(--gold); }
  header.top .subtitle { color: var(--muted); font-size: 13px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-card .value { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 30px; font-weight: 700; margin-top: 6px; }
  .stat-card.gold .value { color: var(--gold); }

  section { margin-bottom: 44px; }
  section h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .seal { display: inline-block; width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--gold), var(--gold-dim)); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.certified { background: rgba(216,173,76,0.15); color: var(--gold); }
  .badge.pending { background: rgba(147,162,184,0.15); color: var(--muted); }
  .badge.active { background: rgba(85,201,138,0.15); color: var(--green); }

  .empty { color: var(--muted); font-size: 13px; padding: 16px 0; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  .table-wrap table { margin: 0; }
  .table-wrap .empty { padding: 20px; }

  .contest-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .contest-controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .contest-controls input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    min-width: 180px;
  }
  .contest-controls button {
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-start { background: var(--green); color: #06281a; }
  .btn-end { background: var(--red); color: #2a0d10; }
  .btn-start:hover, .btn-end:hover { filter: brightness(1.08); }
  .contest-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .contest-msg.error { color: var(--red); }
  .contest-msg.success { color: var(--green); }
</style>
</head>
<body>

  <div id="gate">
    <div class="brand">EduFlow <span>Ai</span> — Admin</div>
    <input type="password" id="key-input" placeholder="Admin key" />
    <button onclick="tryLogin()">Enter</button>
    <div id="gate-error"></div>
  </div>

  <div id="dashboard">
    <header class="top">
      <div>
        <div class="brand">EduFlow <span>Ai</span></div>
        <div class="subtitle">Admin Dashboard</div>
      </div>
      <div class="subtitle" id="refreshed"></div>
    </header>

    <div class="stats-row" id="stats-row"></div>

    <section>
      <h2><span class="seal"></span> Contests</h2>
      <div class="contest-box">
        <div id="contest-status"></div>
        <div class="contest-controls">
          <input type="text" id="contest-name-input" placeholder="New contest name (e.g. October Sprint)" />
          <button class="btn-start" onclick="startContest()">Start Contest</button>
          <button class="btn-end" onclick="endContest()">End Active Contest</button>
        </div>
        <div id="contest-msg" class="contest-msg"></div>
        <div class="table-wrap"><table id="contest-standings-table"></table></div>
      </div>
    </section>

    <section>
      <h2><span class="seal"></span> Learners</h2>
      <div class="table-wrap"><table id="users-table"></table></div>
    </section>

    <section>
      <h2><span class="seal"></span> Certificates Issued</h2>
      <div class="table-wrap"><table id="certs-table"></table></div>
    </section>
  </div>

<script>
  const KEY_STORAGE = 'eduflow_admin_key';

  function esc(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function getKey() {
    return localStorage.getItem(KEY_STORAGE);
  }

  async function apiGet(path) {
    const res = await fetch(path, { headers: { 'x-admin-key': getKey() } });
    if (!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  }

  async function apiPost(path, body) {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'x-admin-key': getKey(), 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ('Request failed: ' + res.status));
    return data;
  }

  async function tryLogin() {
    const input = document.getElementById('key-input');
    const key = input.value.trim();
    if (!key) return;
    localStorage.setItem(KEY_STORAGE, key);
    const ok = await loadDashboard();
    if (!ok) {
      document.getElementById('gate-error').textContent = 'Invalid admin key.';
      localStorage.removeItem(KEY_STORAGE);
    }
  }

  function renderStats(stats) {
    const row = document.getElementById('stats-row');
    const topTopic = stats.topTopics[0] ? stats.topTopics[0].topic : '—';
    row.innerHTML = `
      <div class="stat-card"><div class="label">Total Learners</div><div class="value">${stats.totalUsers}</div></div>
      <div class="stat-card gold"><div class="label">Certificates Issued</div><div class="value">${stats.totalCertificates}</div></div>
      <div class="stat-card"><div class="label">Average XP</div><div class="value">${stats.averageXp}</div></div>
      <div class="stat-card"><div class="label">Top Topic</div><div class="value" style="font-size:18px">${esc(topTopic)}</div></div>
    `;
  }

  function renderUsers(users) {
    const table = document.getElementById('users-table');
    if (!users.length) {
      table.innerHTML = '<tr><td class="empty">No learners yet.</td></tr>';
      return;
    }
    table.innerHTML = `
      <tr>
        <th>Name</th><th>Phone</th><th>Topic</th><th>Lesson</th>
        <th>XP</th><th>Level</th><th>Final Score</th><th>Certified</th>
      </tr>
      ${users.map(u => `
        <tr>
          <td>${esc(u.name) || '—'}</td>
          <td>${esc(u.phone_number)}</td>
          <td>${esc(u.current_topic) || '—'}</td>
          <td>${u.current_topic ? (u.current_lesson_number ?? 0) + '/5' : '—'}</td>
          <td>${u.xp ?? 0}</td>
          <td>${esc(u.level)}</td>
          <td>${u.final_assessment_score !== null && u.final_assessment_score !== undefined ? u.final_assessment_score + '/10' : '—'}</td>
          <td>${u.certificate_issued
            ? '<span class="badge certified">Certified</span>'
            : '<span class="badge pending">Pending</span>'}</td>
        </tr>
      `).join('')}
    `;
  }

  function renderCertificates(certs) {
    const table = document.getElementById('certs-table');
    if (!certs.length) {
      table.innerHTML = '<tr><td class="empty">No certificates issued yet.</td></tr>';
      return;
    }
    table.innerHTML = `
      <tr>
        <th>Code</th><th>Name</th><th>Topic</th><th>Score</th><th>Issued</th>
      </tr>
      ${certs.map(c => `
        <tr>
          <td>${esc(c.certificate_code)}</td>
          <td>${esc(c.name)}</td>
          <td>${esc(c.topic)}</td>
          <td>${c.score}/10</td>
          <td>${new Date(c.issued_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</td>
        </tr>
      `).join('')}
    `;
  }

  function renderContestStandingsTable(standings) {
    const table = document.getElementById('contest-standings-table');
    if (!standings || !standings.length) {
      table.innerHTML = '<tr><td class="empty">No team XP recorded yet for this contest.</td></tr>';
      return;
    }
    table.innerHTML = `
      <tr><th>Rank</th><th>Team</th><th>XP Earned</th></tr>
      ${standings.map((s, i) => `
        <tr><td>${i + 1}</td><td>${esc(s.name)}</td><td>${s.xpEarned}</td></tr>
      `).join('')}
    `;
  }

  async function refreshContestStatus() {
    try {
      const data = await apiGet('/api/admin/contests/active');
      const statusDiv = document.getElementById('contest-status');
      if (data.contest) {
        const startedAt = new Date(data.contest.started_at).toLocaleString();
        statusDiv.innerHTML = `<span class="badge active">Active</span> &nbsp; <strong>${esc(data.contest.name)}</strong> &nbsp; <span style="color:var(--muted)">started ${startedAt}</span>`;
      } else {
        statusDiv.innerHTML = `<span class="badge pending">No active contest</span>`;
      }
      renderContestStandingsTable(data.standings);
    } catch (e) {
      document.getElementById('contest-status').innerHTML = '<span class="badge pending">Could not load contest status</span>';
    }
  }

  function setContestMsg(text, isError) {
    const el = document.getElementById('contest-msg');
    el.textContent = text;
    el.className = 'contest-msg ' + (isError ? 'error' : 'success');
  }

  async function startContest() {
    const input = document.getElementById('contest-name-input');
    const name = input.value.trim();
    if (!name) {
      setContestMsg('Enter a contest name first.', true);
      return;
    }
    try {
      await apiPost('/api/admin/contests/start', { name });
      setContestMsg(`Contest "${name}" started!`, false);
      input.value = '';
      await refreshContestStatus();
    } catch (e) {
      setContestMsg(e.message, true);
    }
  }

  async function endContest() {
    try {
      const data = await apiPost('/api/admin/contests/end');
      if (data.winner) {
        setContestMsg(`Contest ended! Winner: ${data.winner.name} (${data.winner.xpEarned} XP). Members notified.`, false);
      } else {
        setContestMsg('Contest ended - no team had any XP earned.', false);
      }
      await refreshContestStatus();
    } catch (e) {
      setContestMsg(e.message, true);
    }
  }

  async function loadDashboard() {
    try {
      const [stats, usersRes, certsRes] = await Promise.all([
        apiGet('/api/admin/stats'),
        apiGet('/api/admin/users'),
        apiGet('/api/admin/certificates'),
      ]);
      renderStats(stats);
      renderUsers(usersRes.users);
      renderCertificates(certsRes.certificates);
      await refreshContestStatus();
      document.getElementById('refreshed').textContent = 'Updated ' + new Date().toLocaleTimeString();
      document.getElementById('gate').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      return true;
    } catch (e) {
      return false;
    }
  }

  document.getElementById('key-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryLogin();
  });

  if (localStorage.getItem(KEY_STORAGE)) {
    loadDashboard().then(ok => {
      if (!ok) localStorage.removeItem(KEY_STORAGE);
    });
  }
</script>
</body>
</html>
